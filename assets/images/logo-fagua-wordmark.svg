<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-label="FAGUA wordmark logo">
  <!-- Premium wordmark "FAGUA" in geometric sans-serif feel. The G is replaced with a gear-tooth ring as the subtle cycling element. Dark-background safe. -->
  <title>FAGUA Wordmark</title>
  <defs>
    <linearGradient id="fgw-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="fgw-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>
  <g fill="url(#fgw-grad)">
    <!-- Letter F -->
    <rect x="40" y="60" width="26" height="180" rx="4"/>
    <rect x="40" y="60" width="120" height="26" rx="4"/>
    <rect x="40" y="137" width="96" height="26" rx="4"/>
    <!-- Letter A (left) -->
    <path d="M196 240 L244 60 L268 60 L220 240 Z"/>
    <path d="M210 137 L252 137 L252 161 L210 161 Z"/>
    <!-- Letter G is replaced by a gear ring (the cycling element) -->
    <!-- (see accent group below) -->
    <!-- Letter U -->
    <path d="M624 60 L624 180 Q624 240 684 240 L740 240 Q800 240 800 180 L800 60 L774 60 L774 180 Q774 214 740 214 L684 214 Q650 214 650 180 L650 60 Z"/>
    <!-- Letter A (right) -->
    <path d="M820 240 L868 60 L892 60 L844 240 Z"/>
    <path d="M834 137 L876 137 L876 161 L834 161 Z"/>
  </g>
  <!-- Gear ring acting as the 'G': a ring with 12 teeth, centered where the G sits -->
  <g transform="translate(460,150)">
    <g fill="url(#fgw-accent)">
      <!-- Outer gear teeth as 12 rounded rects rotated around center -->
      <g>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(0)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(30)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(60)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(90)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(120)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(150)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(180)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(210)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(240)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(270)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(300)"/>
        <rect x="-12" y="-96" width="24" height="22" rx="4" transform="rotate(330)"/>
      </g>
    </g>
    <!-- Gear body: outer ring + inner hub with a G-opening on the right -->
    <path d="M0,-78 A78,78 0 1,1 0,78 A78,78 0 1,1 0,-78 Z" fill="none" stroke="url(#fgw-grad)" stroke-width="26"/>
    <!-- Cut the opening of the G with a background-colored wedge (for dark bg we use the canvas, so we just draw the hub) -->
    <circle r="26" fill="url(#fgw-grad)"/>
    <rect x="0" y="-14" width="40" height="28" rx="6" fill="url(#fgw-grad)"/>
  </g>
</svg>
