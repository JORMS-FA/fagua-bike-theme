name: Deploy

on:
  # Deploy a staging cuando hay push a develop
  # Deploy a producción cuando hay push a main
  push:
    branches:
      - main
      - develop
  # Deploy manual (workflow_dispatch con environment seleccionado)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de deploy'
        required: true
        type: choice
        default: 'staging'
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'auto' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  # ──────────────────────────────────────────────────────
  #  Tests antes de deploy
  # ──────────────────────────────────────────────────────
  test:
    name: Tests (PHP, JS, CSS)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint:js
        continue-on-error: true

      - name: Run Stylelint
        run: npm run lint:css
        continue-on-error: true

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, dom

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHP_CodeSniffer
        run: composer phpcs
        continue-on-error: true

      - name: Run PHPStan
        run: composer phpstan
        continue-on-error: true

  # ──────────────────────────────────────────────────────
  #  Deploy por FTP
  # ──────────────────────────────────────────────────────
  deploy-ftp:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare deploy
        run: |
          echo "Files to deploy: $(find . -type f -not -path './node_modules/*' -not -path './.git/*' -not -path './.github/*' | wc -l)"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git/**
            **/node_modules/**
            **/vendor/**
            **/.github/**
            **/tests/**
            **/.editorconfig
            **/.eslintrc.json
            **/.stylelintrc.json
            **/.gitattributes
            **/phpcs.xml.dist
            **/phpstan.neon.dist
            **/phpunit.xml.dist
            **/composer.json
            **/composer.lock
            **/package.json
            **/package-lock.json
            **/playwright.config.ts
            **/playwright-report/**
            **/test-results/**
            **/CHANGELOG.md
            **/LICENSE
            **/README.md
            **/docs/**
            **/.gitignore
            **/tools/**
            **/wp-config.php.template
            **/assets/images/hero-cyclist-original-bad.jpg
          log-level: minimal
          security: false
          timeout: 600

      - name: Deploy Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────
  #  Health check post-deploy
  # ──────────────────────────────────────────────────────
  health-check:
    name: Health check
    runs-on: ubuntu-latest
    needs: deploy-ftp
    if: success()
    steps:
      - name: Verify site is reachable
        run: |
          URL="${{ secrets.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then URL="${{ vars.STAGING_URL }}"; fi
          if [ -z "$URL" ]; then
            echo "No URL configured. Skipping."
            exit 0
          fi
          echo "Checking $URL"
          HTTP_CODE=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Site is healthy"
          else
            echo "❌ Site returned $HTTP_CODE"
            exit 1
          fi
